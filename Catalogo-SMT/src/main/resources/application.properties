# Configura\u00e7\u00e3o da aplica\u00e7\u00e3o
spring.application.name=Catalogo-SMT

# Configura\u00e7\u00e3o do H2 Database
spring.datasource.url=jdbc:h2:mem:inventory_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=natal
spring.datasource.password=rn

# Configura\u00e7\u00e3o do H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Configura\u00e7\u00e3o do JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Configura\u00e7\u00e3o de logging
logging.level.com.example.Catalogo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configura\u00e7\u00e3o do servidor
server.port=8080
server.servlet.context-path=/

# Configura\u00e7\u00e3o de encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Configura\u00e7\u00e3o de valida\u00e7\u00e3o
spring.jpa.properties.hibernate.validator.apply_to_ddl=false

# Configura\u00e7\u00e3o de inicializa\u00e7\u00e3o de dados
spring.sql.init.mode=never